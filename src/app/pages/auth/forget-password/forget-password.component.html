<section class>
  <div class="login-navbar">
    <div class="row  m-0">
      <div class="col-md-12 d-flex justify-content-between align-items-center mb-4">
        <img  src="../../../assets/img/career_hive_logo1.svg" class="img-fluid top-logo" alt="institude">
        <!-- <div class="pr-4">
            <p>
              Login as an 
              <span>
                <a class="link" routerLink="/employer-login">
                  Employer
                </a>
              </span>
              or as an 
              <span>
                <a class="link"  routerLink="/login">
                  Admin
                </a>
              </span>
            </p>
          </div> -->
      </div>
    </div>
  </div>
  <div class="login_initial pt-5">
    <div class="container">
      <div class="">
        <div class="row align-items-center">
          <!-- <div class="col-md-12">
        <div class="d-flex justify-content-between">
          <img src="../../../../assets/img/careerHive/engineers-australia-logo.svg" class="img-fluid" alt="institude">
                      <img src="../../../assets/img/career_hive_logo1.svg" width="248px" class="img-fluid" alt="career_hive_logo">
                  </div>
      </div> -->
          <div class="col-md-6" >
            <img *ngIf="panelType=='student'" src="../../../../assets/img/Student.png" class="img-fluid" alt="employer">
            <img *ngIf="panelType=='employee'" src="../../../../assets/img/Employer.png" class="img-fluid" alt="employer">
            <img *ngIf="panelType=='admin'" src="../../../../assets/img/Admin.png" class="img-fluid" alt="employer">
          </div>
          <div [formGroup]="forgotpwdform" class="col-md-6">
            <ng-container *ngIf="!forgetForm">
              <div class="forget_title">
                <h1>Reset your Password</h1>
                <!-- <p>Enter your email and we’ll send you a link to reset your
                  password.</p> -->
              </div>
              <div>
                <div class="form-group">
                  <!-- <label for="exampleInputEmail1">Email Address</label> -->
                  <input type="text" class="form-control input-radius" placeholder="Username" autocomplete="username" required
                    formControlName="email">
                  <div
                    *ngIf="(forgotpwdform.touched || forgotpwdform.dirty) && forgotpwdform.invalid && forgotpwdform.controls.email.errors?.required"
                    class="invalid-feedback">
                    *Please enter email
                  </div>
                  <div
                    *ngIf="(forgotpwdform.touched || forgotpwdform.dirty) && forgotpwdform.invalid && forgotpwdform.controls.email.errors?.email"
                    class="invalid-feedback">
                    *Please enter valid Email
                  </div>
                </div>
                <div class="submt-btn submit_btn_auth">
                  <button [disabled]="forgotpwdform.invalid" (click)="sendemail()" mat-button
                    class="theme_btn btn_primary w-100">Reset</button>
                  <!-- <p class="text-center mt-3"><a routerLink="/login">Back to log in</a></p> -->
                </div>
              </div>
            </ng-container>
            <div *ngIf="forgetForm" class="success_sent_forget_ps_email">
              
              <h1>Email successfully sent!</h1>
              <p>Please check your email to replace your previous password with a new one.
              </p>

              <div class="submt-btn submit_btn_auth mt-2">
                <button (click)="gotoLogin()" mat-button class="theme_btn btn_primary w-100">Back to Login</button>
                <!-- <p class="text-center mt-3"><a routerLink="/login">Back to log in</a></p> -->
              </div>

            </div>
          </div>

        </div>
      </div>

    </div>
  </div>
</section>
