    <div class=" page_header_container">
        <div>
            <h4>{{placementGroupDetail?.title}}</h4>
        </div>
    </div>
</div>

<section>
    <!--  -->
    <div class="bs_tab_nav placement">
        <ul class="nav nav-pills" id="pills-tab" role="tablist" >
            <li class="nav-item">
                <a class="nav-link active" id="overview-tab" data-toggle="pill" href="#overview" role="tab"
                    aria-controls="overview" aria-selected="true">Overview</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" id="workflow-tab" data-toggle="pill" href="#workflow" role="tab"
                    aria-controls="workflow" aria-selected="false">Workflow</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" id="eligible-students-tab" data-toggle="pill" href="#eligible-students" role="tab"  (click)="onEligibleStudentsTabClick()"
                    aria-controls="eligible-students" aria-selected="false">Eligible Students</a>
            </li>
        </ul>
        <div class="tab-content" id="pills-tabContent">
            <div class="tab-pane fade show active" id="overview" role="tabpanel" aria-labelledby="overview-tab">
                <app-placement-overview-project [mode]=actionType (placementDetail)="getPlacementDetails($event)"></app-placement-overview-project>
            </div>
            <div class="tab-pane fade" id="workflow" role="tabpanel" aria-labelledby="workflow-tab">
                <app-placement-workflow-project [updatedPlacementDetail]="placementGroupDetails" ></app-placement-workflow-project>
            </div>
            <div class="tab-pane fade" id="eligible-students" role="tabpanel" aria-labelledby="eligible-students-tab">
                <app-placement-project-eligible-students #placementEligibleStudents [updatedPlacementDetail]="placementGroupDetails" (refreshTabData)="refreshTabData($event)"></app-placement-project-eligible-students>
            </div>
        </div>
    </div>
</section>
