<section class="search_database_eligible_student">
    <div class="eleigible_student_card">
        <div class="content">
            <div class="icon_place">

                <svg width="29" height="29" viewBox="0 0 29 29" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M24.1666 25.375V22.9583C24.1666 21.6765 23.6574 20.4471 22.7509 19.5407C21.8445 18.6342 20.6151 18.125 19.3333 18.125H9.66659C8.38471 18.125 7.15533 18.6342 6.2489 19.5407C5.34248 20.4471 4.83325 21.6765 4.83325 22.9583V25.375"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    <path
                        d="M14.5001 13.2917C17.1695 13.2917 19.3334 11.1277 19.3334 8.45833C19.3334 5.78896 17.1695 3.625 14.5001 3.625C11.8307 3.625 9.66675 5.78896 9.66675 8.45833C9.66675 11.1277 11.8307 13.2917 14.5001 13.2917Z"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>

            </div>
            <p>Eligible Students</p>
        </div>
        <h2>22</h2>
    </div>
    <div class="bold_lable_form inset_shadow_field">
        <div class="row form-group">
            <div class="col-3"><label class="label_title">Major</label></div>
            <div class="col-6">
                <div>
                    <ng-select formControlName="major" [searchable]="false" [multiple]="true" bindLabel="name"
                        bindValue="id" [clearable]="false" placeholder="Select Major">
                        <ng-option value="Bachelor of Finance">Bachelor of Finance</ng-option>
                    </ng-select>
                </div>
            </div>
        </div>
        <div class="row form-group">
            <div class="col-3"><label class="label_title">Specific Skills</label></div>
            <div class="col-6">
                <input type="text" class="form-control" placeholder="Add Specific Skills">
            </div>
        </div>
        <div class="row form-group">
            <div class="col-3"><label class="label_title">Intake Date</label></div>
            <div class="col-6 date_group ml-0">
                <div class="form-group mb-0 custom_datepicker">
                    <div class="custom_datepicker_container">
                        <input formControlName="startDate" placeholder="Start Date" class="form-control" matInput
                            [matDatepicker]="projectStartPicker">
                        <mat-datepicker-toggle matSuffix [for]="projectStartPicker">

                            <svg matDatepickerToggleIcon width="18" height="18" viewBox="0 0 18 18" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M14.25 3H3.75C2.92157 3 2.25 3.67157 2.25 4.5V15C2.25 15.8284 2.92157 16.5 3.75 16.5H14.25C15.0784 16.5 15.75 15.8284 15.75 15V4.5C15.75 3.67157 15.0784 3 14.25 3Z"
                                    stroke="#2B2A35" stroke-width="1.5" stroke-linecap="round"
                                    stroke-linejoin="round" />
                                <path d="M12 1.5V4.5" stroke="#2B2A35" stroke-width="1.5" stroke-linecap="round"
                                    stroke-linejoin="round" />
                                <path d="M6 1.5V4.5" stroke="#2B2A35" stroke-width="1.5" stroke-linecap="round"
                                    stroke-linejoin="round" />
                                <path d="M2.25 7.5H15.75" stroke="#2B2A35" stroke-width="1.5" stroke-linecap="round"
                                    stroke-linejoin="round" />
                            </svg>
                        </mat-datepicker-toggle>
                        <mat-datepicker #projectStartPicker></mat-datepicker>
                    </div>
                </div>
                <div class="to">-</div>
                <div class="form-group mb-0 custom_datepicker">
                    <div class="custom_datepicker_container">
                        <input formControlName="endDate" placeholder="End Date" class="form-control" matInput
                            [matDatepicker]="projectEndPicker">
                        <mat-datepicker-toggle matSuffix [for]="projectEndPicker">
                            <svg matDatepickerToggleIcon width="18" height="18" viewBox="0 0 18 18" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M14.25 3H3.75C2.92157 3 2.25 3.67157 2.25 4.5V15C2.25 15.8284 2.92157 16.5 3.75 16.5H14.25C15.0784 16.5 15.75 15.8284 15.75 15V4.5C15.75 3.67157 15.0784 3 14.25 3Z"
                                    stroke="#2B2A35" stroke-width="1.5" stroke-linecap="round"
                                    stroke-linejoin="round" />
                                <path d="M12 1.5V4.5" stroke="#2B2A35" stroke-width="1.5" stroke-linecap="round"
                                    stroke-linejoin="round" />
                                <path d="M6 1.5V4.5" stroke="#2B2A35" stroke-width="1.5" stroke-linecap="round"
                                    stroke-linejoin="round" />
                                <path d="M2.25 7.5H15.75" stroke="#2B2A35" stroke-width="1.5" stroke-linecap="round"
                                    stroke-linejoin="round" />
                            </svg>
                        </mat-datepicker-toggle>
                        <mat-datepicker #projectEndPicker></mat-datepicker>
                    </div>
                </div>
            </div>
        </div>
        <div class="row form-group">
            <div class="col-3"><label class="label_title">Degree Level</label></div>
            <div class="col-6">
                <div>
                    <ng-select [searchable]="false" [multiple]="true" bindLabel="name" bindValue="id"
                        [clearable]="false" placeholder="Select a Degree">
                        <ng-option value="Information Technology">Information Technology</ng-option>
                    </ng-select>
                </div>
            </div>
        </div>
        <div class="row form-group">
            <div class="col-3"><label class="label_title">Grade Point Average (GPA)</label></div>
            <div class="col-6 date_group ml-0">
                <div class="form-group mb-0 custom_datepicker">
                    <div class="custom_datepicker_container">
                        <input type="text" placeholder="Min. GPA" class="form-control">
                    </div>
                </div>
                <div class="to label_title">to</div>
                <div class="form-group mb-0 custom_datepicker">
                    <div class="custom_datepicker_container">
                        <input type="text" placeholder="Max. GPA" class="form-control">

                    </div>
                </div>
            </div>
        </div>
        <div class="row form-group">
            <div class="col-3"><label class="label_title">Work Rights</label></div>
            <div class="col-6">
                <div>
                    <ng-select [searchable]="false" [multiple]="false" bindLabel="name" bindValue="id"
                        [clearable]="false" placeholder="Select Work Rights">
                        <ng-option value="Full Time Work Rights">Full Time Work Rights</ng-option>
                    </ng-select>
                </div>
            </div>
        </div>
        <div class="row form-group">
            <div class="col-3"><label class="label_title">Year Level</label></div>
            <div class="col-6">
                <div>
                    <ng-select [searchable]="false" [multiple]="true" bindLabel="name" bindValue="id"
                        [clearable]="false" placeholder="Select Year Level">
                        <ng-option value="First Year">First Year</ng-option>
                    </ng-select>
                </div>
            </div>
        </div>
        <div class="row form-group">
            <div class="col-3"><label class="label_title">Applicant Type</label></div>
            <div class="col-6">
                <div>
                    <ng-select [searchable]="false" [multiple]="true" bindLabel="name" bindValue="id"
                        [clearable]="false" placeholder="Select Type">
                        <ng-option value="Domestic Undergrad">Domestic Undergrad</ng-option>
                    </ng-select>
                </div>
            </div>
        </div>
        <div class="row form-group">
            <div class="col-3"><label class="label_title">Alumni?</label></div>
            <div class="col-6">
                <mat-radio-group class="radio_group">
                    <mat-radio-button value="yes" class="mr-3">Yes</mat-radio-button>
                    <mat-radio-button value="no">No</mat-radio-button>
                </mat-radio-group>
            </div>
        </div>
        <div class="row form-group">
            <div class="col-3"><label class="label_title">Exclude Completed Placements?</label></div>
            <div class="col-6">
                <mat-radio-group class="radio_group">
                    <mat-radio-button value="yes" class="mr-3">Yes</mat-radio-button>
                    <mat-radio-button value="no">No</mat-radio-button>
                </mat-radio-group>
            </div>
        </div>
        <div class="search_database_btns">
            <button mat-button class="theme_btn btn_primary">

                <svg class="mr-2" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M11 19C15.4183 19 19 15.4183 19 11C19 6.58172 15.4183 3 11 3C6.58172 3 3 6.58172 3 11C3 15.4183 6.58172 19 11 19Z"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M20.9999 20.9999L16.6499 16.6499" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                Search</button>
            <button mat-button class="theme_btn btn_outline_primary">
                <svg class="mr-2" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <path d="M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
                Clear</button>
        </div>
    </div>

    <ng-container title="Show after click Serch Button">
    <div class="search_database_results_container">
        <div class="table-responsive">
            <table mat-table [dataSource]="eligibleStudentList" matSort class="ch_table">
                <!-- Name Column -->
                <ng-container matColumnDef="name">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
                    <td mat-cell *matCellDef="let row">
                        {{row.name}}
                    </td>
                </ng-container>
                <!-- Last Name Column -->
                <ng-container matColumnDef="last_name">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header>Last Name </th>
                    <td mat-cell *matCellDef="let row">
                        {{row.last_name}}
                    </td>
                </ng-container>
                <!-- Major Column -->
                <ng-container matColumnDef="major">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Major </th>
                    <td mat-cell *matCellDef="let row"> {{row.major}} </td>
                </ng-container>
                <!-- Student ID Column -->
                <ng-container matColumnDef="studentId">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header>Student ID</th>
                    <td mat-cell *matCellDef="let row">
                        {{row.studentId}}
                    </td>
                </ng-container>
                <!-- Monthly Cohort Column -->
                <!-- <ng-container matColumnDef="monthlyCohort">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header>Monthly Cohort</th>
                    <td mat-cell *matCellDef="let row">
                        {{row.monthlyCohort}}
                    </td>
                </ng-container> -->

                <!-- Campus Column -->
                <ng-container matColumnDef="campus">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header>Campus</th>
                    <td mat-cell *matCellDef="let row">
                        {{row.campus}}
                    </td>
                </ng-container>

                <!-- Simulation Group column -->
                <ng-container matColumnDef="email">
                    <th mat-header-cell *matHeaderCellDef> Email </th>
                    <td mat-cell *matCellDef="let row">
                        {{row.email}}
                    </td>
                </ng-container>
                <tr mat-header-row *matHeaderRowDef="eligibleStudentListDisplayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: eligibleStudentListDisplayedColumns;"></tr>
            </table>
        </div>
        <div class="search_database_btns">
            <button mat-button class="theme_btn btn_outline_primary">
                <svg class="mr-2" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <path d="M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
                Reset</button>
            <button mat-button class="theme_btn btn_primary">

                <svg class="mr-2" width="24" height="25" viewBox="0 0 24 25" fill="none"
                    xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 5.40332V19.4033" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                    <path d="M5 12.4033H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>

                Add Student</button>

        </div>
    </div>
</ng-container>
</section>
