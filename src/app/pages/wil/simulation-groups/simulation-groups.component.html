<div class="page_header">
    <div class="page_header_container">
        <div>
            <h4>{{detail?.title}}</h4>
        </div>
    </div>
</div>

<section>
    <div class="bs_tab_nav placement">
        <ul class="nav nav-pills" id="sim-pills-tab" role="tablist">
            <li class="nav-item">
                <a class="nav-link active" id="sim-overview-tab" data-toggle="pill" href="#sim-overview" role="tab"
                    aria-controls="sim-overview" aria-selected="true" (click)="onTabClick('overview')">OVERVIEW</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" id="sim-progress-tab" data-toggle="pill" href="#sim-progress" role="tab"
                    aria-controls="sim-progress" aria-selected="false" (click)="onTabClick('progress')">PROGRESS</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" id="sim-workflow-tab" data-toggle="pill" href="#sim-workflow" role="tab"
                    aria-controls="sim-workflow" aria-selected="false" (click)="onTabClick('workflow')">WORKFLOW</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" id="sim-students-tab" data-toggle="pill" href="#sim-students" role="tab"
                    aria-controls="sim-students" aria-selected="false" (click)="onTabClick('eligible-students')">ELIGIBLE STUDENTS</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" id="sim-testimonies-tab" data-toggle="pill" href="#sim-testimonies" role="tab"
                    aria-controls="sim-testimonies" aria-selected="false" (click)="onTabClick('testimonies')">TESTIMONIES</a>
            </li>
        </ul>

        <div class="tab-content" id="sim-pills-tabContent">
            <!-- ==================== OVERVIEW TAB ==================== -->
            <div class="tab-pane fade show active" id="sim-overview" role="tabpanel" aria-labelledby="sim-overview-tab">
                <app-simulation-overview #simOverview (placementDetail)="getPlacementDetails($event)"></app-simulation-overview>
            </div>

            <!-- ==================== PROGRESS TAB ==================== -->
            <div class="tab-pane fade" id="sim-progress" role="tabpanel" aria-labelledby="sim-progress-tab">
                <app-simulation-progress #simProgress></app-simulation-progress>
            </div>

            <!-- ==================== WORKFLOW TAB ==================== -->
            <div class="tab-pane fade" id="sim-workflow" role="tabpanel" aria-labelledby="sim-workflow-tab">
                <app-simulation-workflow #simWorkflow></app-simulation-workflow>
            </div>

            <!-- ==================== ELIGIBLE STUDENTS TAB ==================== -->
            <div class="tab-pane fade" id="sim-students" role="tabpanel" aria-labelledby="sim-students-tab">
                <app-simulation-eligible-students #simEligibleStudents></app-simulation-eligible-students>
            </div>

            <!-- ==================== TESTIMONIES TAB ==================== -->
            <div class="tab-pane fade" id="sim-testimonies" role="tabpanel" aria-labelledby="sim-testimonies-tab">
                <app-simulation-testimonies #simTestimonies></app-simulation-testimonies>
            </div>
        </div>
    </div>
</section>

<!-- ==================== PUBLISH MODAL ==================== -->
<div class="modal fade bsModal ch_modal" id="publishSimGroup" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Publish Simulation Group</h2>
                <button type="button" mat-icon-button class="close" data-dismiss="modal" aria-label="Close">
                    <mat-icon>close</mat-icon>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="d-block mb-2"><strong>Publish Mode</strong></label>
                    <div class="d-flex" style="gap: 20px;">
                        <label class="radio-label">
                            <input type="radio" name="publishMode" value="instant" [(ngModel)]="publishMode"> Publish Instantly
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="publishMode" value="scheduled" [(ngModel)]="publishMode"> Schedule Date
                        </label>
                    </div>
                </div>
                <div *ngIf="publishMode === 'scheduled'" class="form-group">
                    <div class="row">
                        <div class="col-6">
                            <label>Start Date</label>
                            <input type="date" class="form-control" [formControl]="publishForm.get('start_date')">
                        </div>
                        <div class="col-6">
                            <label>End Date</label>
                            <input type="date" class="form-control" [formControl]="publishForm.get('end_date')">
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <quill-editor [modules]="modules" [formControl]="publishForm.get('description')"></quill-editor>
                </div>
                <div class="form-group">
                    <label class="d-flex align-items-center" style="gap: 10px;">
                        <input type="checkbox" [formControl]="publishForm.get('featured')"> Featured
                    </label>
                </div>
            </div>
            <div class="modal-footer justify-content-between">
                <button mat-button class="theme_btn btn_outline_primary" data-dismiss="modal">Cancel</button>
                <button mat-button class="theme_btn btn_primary" data-dismiss="modal" (click)="publishSimGroup()">Publish</button>
            </div>
        </div>
    </div>
</div>

<!-- ==================== UNPUBLISH MODAL ==================== -->
<div class="modal fade bsModal ch_modal" id="unpublishSimGroup" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" mat-icon-button class="close" data-dismiss="modal" aria-label="Close">
                    <mat-icon>close</mat-icon>
                </button>
            </div>
            <div class="modal-body text-center">
                <h4>Are you sure you want to unpublish this Simulation Group?</h4>
                <p class="text-muted">This will remove it from public view.</p>
            </div>
            <div class="modal-footer justify-content-around">
                <button mat-button class="theme_btn btn_outline_primary" data-dismiss="modal">Cancel</button>
                <button mat-button class="theme_btn btn_primary" data-dismiss="modal" (click)="unpublishSimGroup()">Unpublish</button>
            </div>
        </div>
    </div>
</div>
