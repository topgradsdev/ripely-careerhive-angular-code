<div class="workstation-page">
  <!-- Header -->
  <div class="ws-header">
    <div class="ws-header-icon">
      <i class="fa fa-desktop"></i>
    </div>
    <div class="ws-header-text">
      <h1>Workstation</h1>
      <p>Your tools, documents, and communication channels.</p>
    </div>
  </div>

  <!-- Resource Groups -->
  <div *ngFor="let group of resourceGroups" class="resource-group">
    <div class="group-header">
      <i class="fa" [ngClass]="group.icon"></i>
      <span class="group-label">{{ group.label }}</span>
      <span class="group-count">{{ group.items.length }}</span>
    </div>

    <div class="group-grid">
      <div *ngFor="let item of group.items"
           class="ws-card"
           [class.locked]="getItemStatus(item) === 'locked'"
           [class.active]="getItemStatus(item) === 'active'"
           (click)="openItem(item)">

        <div class="card-icon-wrap" [ngClass]="getItemStatus(item)">
          <i class="fa" [ngClass]="item.icon"></i>
        </div>

        <div class="card-body">
          <span class="card-title">{{ item.title }}</span>
          <span class="card-subtitle">{{ item.subtitle }}</span>
        </div>

        <div class="card-status" [ngClass]="getItemStatus(item)">
          <i class="fa" [ngClass]="getStatusIcon(getItemStatus(item))"></i>
          <span>{{ getStatusLabel(getItemStatus(item)) }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
