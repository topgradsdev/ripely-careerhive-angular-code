<div class="page_header">
    <div class=" page_header_container">
        <div>
            <h4>Create Article</h4>
        </div>
    </div>
</div>
<section>
    <div class="article_card">
        <form>
            <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label>Article Title</label>
                        <input type="text" class="form-control" placeholder="Title">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <label>Author</label>
                        <input type="text" class="form-control" placeholder="Author Name">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <label>Category</label>
                        <ng-select class="select_ng_custom" [searchable]="false" [multiple]="false" bindLabel="name"
                            bindValue="id" [clearable]="false" placeholder="Select Category">
                            <ng-option value="resumes">Resumes</ng-option>
                            <ng-option value="cover_letters">Cover Letters</ng-option>
                            <ng-option value="internships">Internships</ng-option>
                            <ng-option value="job_interviews">Job Interviews</ng-option>
                            <ng-option value="job_trends">Job Trends</ng-option>
                            <ng-option value="linked_in">LinkedIn</ng-option>
                        </ng-select>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group custom_datepicker">
                        <label>Publication Date</label>
                        <div class="custom_datepicker_container">
                            <input placeholder="Select Date" class="form-control" [matDatepicker]="publication">
                            <mat-datepicker-toggle matSuffix [for]="publication">
                                <svg  matDatepickerToggleIcon width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M19 4H5C3.89543 4 3 4.89543 3 6V20C3 21.1046 3.89543 22 5 22H19C20.1046 22 21 21.1046 21 20V6C21 4.89543 20.1046 4 19 4Z" stroke="black" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M16 2V6" stroke="black" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M8 2V6" stroke="black" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M3 10H21" stroke="black" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                            </mat-datepicker-toggle>
                            <mat-datepicker #publication></mat-datepicker>
                        </div>
                    </div>
                </div>
                <div class="col-md-12">
                    <div class="form-group">
                        <label>Article Photo</label>
                        <div class="form-control article_photo_container view_btns_hover">
                            <div class="file_upload mb-3">
                                <p><strong>Drag an image here or <span>browse</span> </strong><br>
                                    File must be the following format: .png, .jpg, .gif and under 5 MB</p>
                                    <label class="file_upload_label" for="image"></label>
                                    <input name="img" type="file" id="image" accept=".png, .jpg, .gif">
                            </div>
                            <div class="action">
                                <label for="image" class="file_btn theme_btn md-theme_btn btn_primary">
                                    Upload New Photo
                                    <input name="img" type="file" id="image" accept=".png, .jpg, .gif">
                                </label>                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-12">
                    <div class="form-group">
                        <label>Article Content</label>
                        <quill-editor [modules]="modules" ></quill-editor>
                        <!-- <editor apiKey="zcwi1f81304uers1lcszh0iq2lbhcaxl5cj6ez0v89wr25z3" class="ch_editor" [init]="{
                            height: 315,
                            menubar: false,
                            statusbar: true,
                            placeholder: 'Start typing',
                            plugins: [
        'textcolor',
                            'advlist autolink lists link image charmap print preview anchor',
                            'searchreplace visualblocks code fullscreen',
                            'insertdatetime media table paste code help wordcount'
                            ],
                            toolbar:
                            'bold italic | \
                            bullist | formatselect | link |',
        contextmenu: false
                        }">
                        </editor> -->
                    </div>
                </div>
            </div>
        </form>
        <div class="row article_footer_btn">
            <div class="col-md-12 pt-4">
                <button mat-button class="theme_btn btn_primary mr-2">Create</button>
                <button mat-button class="theme_btn btn_outline_primary" (click)="back()">Cancel</button>
            </div>
        </div>
    </div>
</section>
