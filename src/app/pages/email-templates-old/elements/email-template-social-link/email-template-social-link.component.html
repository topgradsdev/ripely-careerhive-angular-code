<div *ngIf="data?.elementData.insideSection" class="social_link_container" [ngClass]="selected ? 'selected' : ''">
    <div class="social_link_container_main">
        <div class="social_link_container_inner" (click)="toggleElement()">
            <div class="socialLinks" [ngClass]="data?.elementData?.socialBar?.direction === 'vertical' ? 'social_links_vertical' : ''" [style.gap]="data?.elementData?.socialBar?.spacing + 'px'">
                <ng-container *ngIf="!data?.elementData?.manageLinks">
                    <img src="../../../../../assets/img/insta.svg" alt="logo">
                    <img src="../../../../../assets/img/whatsapp.svg" alt="logo">
                    <img src="../../../../../assets/img/fb.svg" alt="logo">
                    <img src="../../../../../assets/img/linkedin.svg" alt="logo">
                    <img src="../../../../../assets/img/youtube.svg" alt="logo">
                </ng-container>
                <ng-container *ngFor="let logo of data?.elementData?.manageLinks?.logos">
                    <div class="d-inline-flex justify-content-center align-items-center flex-column">
                    <a *ngIf="logo.link" [href]="logo.link"><img [src]="logo.logo" alt="logo.name"></a>
                    <img [style.height]="data?.elementData?.socialBar?.iconSize + 'px'" *ngIf="!logo.link" [src]="logo.logo" alt="logo.name">
                    <span class="d-inline-block mt-1" *ngIf="data?.elementData?.socialBar?.showText" [style.fontSize]="data?.elementData?.socialBar?.textSize  + 'px'">{{logo.name}}</span>
                </div>
                </ng-container>
            </div>
        </div>
        <div class="action_container">
            <div class="action_btn_container">
                <div class="drag_with_title action_btn" cdkDragHandle>

<div class="modal fade bsModal ch_modal edit_element_modal" id="edit_social_link{{data?.index}}" tabindex="-1" role="dialog"
    aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Edit Social Bar</h2>
                <button type="button" mat-icon-button id="closeModal" class="close" data-dismiss="modal"
                    aria-label="Close">
                    <mat-icon>close</mat-icon>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Direction</label>
                    <div class="direction_container">
                        <div class="direction_card" [ngClass]="element.socialBar.direction === 'horizontal' ? 'active' : ''" (click)="element.socialBar.direction = 'horizontal'">
                            <figure><svg width="56" height="16" viewBox="0 0 56 16" fill="none"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <rect width="16" height="16" rx="3" fill="#ECEDFF" />
                                    <rect x="20" width="16" height="16" rx="3" fill="#ECEDFF" />
                                    <rect x="40" width="16" height="16" rx="3" fill="#ECEDFF" />
                                </svg></figure>
                            <p>Horizontal</p>
                        </div>
                        <div class="direction_card" [ngClass]="element.socialBar.direction === 'vertical' ? 'active' : ''" (click)="element.socialBar.direction = 'vertical'">
                            <figure>
                                <svg width="17" height="56" viewBox="0 0 17 56" fill="none"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <rect x="16.4531" width="16" height="16" rx="3" transform="rotate(90 16.4531 0)"
                                        fill="#ECEDFF" />
                                    <rect x="16.4531" y="20" width="16" height="16" rx="3"
                                        transform="rotate(90 16.4531 20)" fill="#ECEDFF" />
                                    <rect x="16.4531" y="40" width="16" height="16" rx="3"
                                        transform="rotate(90 16.4531 40)" fill="#ECEDFF" />
                                </svg>
                            </figure>
                            <p>Vertical</p>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Spacing</label>
                    <div class="slider_with_value"><mat-slider [(ngModel)]="element.socialBar.spacing" min="0" max="100" step="1" class="mat_slider">
                            <input matSliderThumb>
                        </mat-slider>
                        <div class="value_inter_input">
                            <input type="text" [(ngModel)]="element.socialBar.spacing">
                            <span>px</span>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Icon Size</label>
                    <div class="slider_with_value"><mat-slider [(ngModel)]="element.socialBar.iconSize" min="0" max="100" step="1" class="mat_slider">
                            <input matSliderThumb>
                        </mat-slider>
                        <div class="value_inter_input">
                            <input type="text" [(ngModel)]="element.socialBar.iconSize">
                            <span>px</span>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Show Text</label>
                    <div class="d-flex align-items-center
                    ">
                        <mat-button-toggle-group class="custom_mat_switch mr-3" [(ngModel)]="element.socialBar.showText">
                            <mat-button-toggle [value]="true">On</mat-button-toggle>
                            <mat-button-toggle [value]="false">Off</mat-button-toggle>
                        </mat-button-toggle-group>
                        <div class="form-group flex-grow-1 mb-0">
                            <label class="mb-0">Text Size</label>
                            <div class="slider_with_value"><mat-slider [(ngModel)]="element.socialBar.textSize" min="0" max="100" step="1" class="mat_slider">
                                    <input matSliderThumb>
                                </mat-slider>
                                <div class="value_inter_input">
                                    <input type="text" [(ngModel)]="element.socialBar.textSize">
                                    <span>px</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer justify-content-right">
                <button mat-button type="button" class="theme_btn btn_secondary" data-dismiss="modal">Cancel</button>
                <button mat-button type="submit" class="theme_btn btn_primary" data-dismiss="modal" (click)="save()">Save</button>
            </div>
        </div>
    </div>
</div>
<div class="modal fade bsModal ch_modal manage_social_link" id="manage_social_link{{data?.index}}" tabindex="-1"
    role="dialog" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Manage Links</h2>
                <button type="button" mat-icon-button id="closeModal" class="close" data-dismiss="modal"
                    aria-label="Close">
                    <mat-icon>close</mat-icon>
                </button>
            </div>
            <div class="modal-body">
                <div class="edit_social_link_container">
                    <div class="social_icon" *ngFor="let logo of element.manageLinks.logos; let i = index;" [ngClass]="logo.selected ? 'active' : ''" (click)="selectLogo(logo)">
                        <img src="{{logo.logo}}" alt="logo">
                        <svg (click)="removeIcon(i)" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="11.9297" cy="11.9314" r="8.43675" transform="rotate(45 11.9297 11.9314)"
                                fill="#F47761" />
                            <path d="M7.70312 8.30566L15.8972 16.4997" stroke="white" />
                            <path d="M16.1562 8.30566L7.96219 16.4997" stroke="white" />
                        </svg>

                    </div>                   
                    <label class="add_icon_btns" for="image">
                        <svg class="add_icon_btn" width="57" height="57" viewBox="0 0 57 57" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <rect x="0.5" y="0.5" width="56" height="56" rx="2.5" stroke="#464BA8" stroke-dasharray="2 2" />
                        <path d="M29 20.25V37.75" stroke="#464BA8" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M20.25 29H37.75" stroke="#464BA8" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    <input name="img" type="file" id="image" accept="image/*" (change)="getImage($event)">
                    </label>

                </div>
                <div class="form-group">
                    <label>Social Media</label>
                    <input type="text" placeholder="Social Media name" value="Facebbok" class="form-control" [(ngModel)]="selectedLogo.name">
                </div>
                <div class="form-group">
                    <label>URL</label>
                    <input type="text" placeholder="Paste it here" class="form-control" [(ngModel)]="selectedLogo.link">
                </div>
            </div>
            <div class="modal-footer justify-content-right">
                <button mat-button type="button" class="theme_btn btn_secondary" data-dismiss="modal">Cancel</button>
                <button mat-button type="submit" class="theme_btn btn_primary" data-dismiss="modal" (click)="save()">Save</button>
            </div>
        </div>
    </div>
</div>
