<div class="divider_container" [ngClass]="selected ? 'selected' : ''" cdkDrag>

<div class="modal fade bsModal ch_modal edit_element_modal" id="edit_divider{{data?.index}}" tabindex="-1" role="dialog"
    aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Edit Divider</h2>
                <button type="button" mat-icon-button id="closeModal" class="close" data-dismiss="modal"
                    aria-label="Close">
                    <mat-icon>close</mat-icon>
                </button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="col-md-12">
                        <div class="form-group">
                            <label>Style</label>
                            <ul class="line_style">
                                <li [ngClass]="element.style === 'solid' ? 'selected' : ''" (click)="element.style = 'solid'">
                                    <hr class="solid">
                                </li>
                                <li [ngClass]="element.style === 'dashed' ? 'selected' : ''" (click)="element.style = 'dashed'">
                                    <hr class="dashed">
                                </li>
                                <li [ngClass]="element.style === 'dotted' ? 'selected' : ''" (click)="element.style = 'dotted'">
                                    <hr class="dotted">
                                </li>
                            </ul>
                        </div>
                    </div>
                    <div class="col-md-12">
                        <div class="form-group">
                            <label>Line Colour</label>
                            <div class="color_container_section">
                                <div class="color_container">
                                    <input type="color" class="color" [(ngModel)]="element.color">
                                    <input type="text" class="values" [(ngModel)]="element.color">
                                </div>
                                <div class="form-group mb-0 flex-grow-1">
                                    <label class="mb-0">Transparency</label>
                                    <div class="slider_with_value"><mat-slider [(ngModel)]="element.transparency" min="0" max="100" step="1" class="mat_slider transparency">
                                            <input matSliderThumb>
                                        </mat-slider>
                                        <div class="value_inter_input">
                                            <input type="text" [(ngModel)]="element.transparency">
                                            <span>%</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>

                    </div>
                    <div class="col-md-12">
                        <div class="form-group">
                            <label>Line Width (px)</label>
                            <div>
                                <mat-checkbox class="example-margin" [(ngModel)]="element.sameWidthAsSection">Same width as
                                    sections</mat-checkbox>
                            </div>
                            <div>
                                <div class="slider_with_value line_width"><mat-slider [(ngModel)]="element.width" min="0" max="20" step="1" class="mat_slider">
                                        <input matSliderThumb>
                                    </mat-slider>
                                    <div class="value_inter_input">
                                        <input type="text" [(ngModel)]="element.width">
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
            <div class="modal-footer justify-content-right">
                <button mat-button type="button" class="theme_btn btn_secondary" data-dismiss="modal">Cancel</button>
                <button mat-button type="submit" class="theme_btn btn_primary" data-dismiss="modal" (click)="save()">Save</button>
            </div>
        </div>
    </div>
</div>
