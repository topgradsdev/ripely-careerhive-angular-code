                <div class="form-group">
                    <label>Column padding</label>
                    <div class="slider_with_value"><mat-slider class="mat_slider" min="0" max="100" step="1" [(ngModel)]="element.padding">
                            <input matSliderThumb>
                        </mat-slider>
                        <div class="value_inter_input" style="width: 50px;">
                            <input type="text" [(ngModel)]="element.padding">
                            <span>px</span>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Column margins</label>
                    <div class="slider_with_value"><mat-slider class="mat_slider" min="0" max="100" step="1" [(ngModel)]="element.margin">
                            <input matSliderThumb>
                        </mat-slider>
                        <div class="value_inter_input">
                            <input type="text" [(ngModel)]="element.margin">
                            <span>px</span>
                        </div>
                    </div>
                </div>
