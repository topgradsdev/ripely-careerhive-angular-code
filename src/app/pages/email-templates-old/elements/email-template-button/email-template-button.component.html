<div class="modal fade bsModal ch_modal" id="add_link{{data?.index}}" tabindex="-1" role="dialog"
    aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Add Link</h2>
                <button type="button" mat-icon-button id="closeModal" class="close" data-dismiss="modal"
                    aria-label="Close">
                    <mat-icon>close</mat-icon>
                </button>
            </div>
            <div class="modal-body">
                <div class="add_link_tab">
                    <div class="nav flex-column nav-pills" id="v-pills-tab" role="tablist" aria-orientation="vertical">
                        <a (click)="element.link.document = ''; element.link.email = '';" class="nav-link active" id="v-pills-web-address-tab" data-toggle="pill" href="#v-pills-web-address" role="tab" aria-controls="v-pills-web-address" aria-selected="true">Web Address</a>
                        <a (click)="element.link.url = ''; element.link.email = '';" class="nav-link" id="v-pills-document-tab" data-toggle="pill" href="#v-pills-document" role="tab" aria-controls="v-pills-document" aria-selected="false">Document</a>
                        <a (click)="element.link.document = ''; element.link.url = '';" class="nav-link" id="v-pills-email-tab" data-toggle="pill" href="#v-pills-email" role="tab" aria-controls="v-pills-email" aria-selected="false">Email</a>
                      </div>
                      <div class="tab-content" id="v-pills-tabContent">
                        <div class="tab-pane fade show active" id="v-pills-web-address" role="tabpanel" aria-labelledby="v-pills-web-address-tab">
                            <div class="form-group">
                                <label>URL</label>
                                <input type="text" class="form-control" placeholder="Paste it here" [(ngModel)]="element.link.url">
                            </div>
                        </div>
                        <div class="tab-pane fade" id="v-pills-document" role="tabpanel" aria-labelledby="v-pills-document-tab">
                            <div class="form-group">
                                <label>Document</label>
                                <div class="file_upload">
                                    <p><strong>Drag file here or <span>browse</span> </strong><br>
                                        File must be the following format: .docx, .pdf and under 10 mb</p>
                                        <label class="file_upload_label" for="image"></label>
                                        <input name="img" type="file" id="image" accept=".doc, .docx, .pdf" (change)="getFile($event)">
                                </div>
                                <label *ngIf="element?.link?.document">{{selectedFile?.name}}</label>
                            </div>
                        </div>
                        <div class="tab-pane fade" id="v-pills-email" role="tabpanel" aria-labelledby="v-pills-email-tab">
                            <div class="form-group">
                                <label>Email To:</label>
                                <input type="email" class="form-control" placeholder="e.g johnsmith@email.com.au"  [(ngModel)]="element.link.email">
                            </div>
                        </div>
                      </div>
                </div>

            </div>
            <div class="modal-footer justify-content-right">
                <button mat-button type="button" class="theme_btn btn_secondary" data-dismiss="modal">Cancel</button>
                <button mat-button type="submit" class="theme_btn btn_primary" data-dismiss="modal" (click)="save()">Save</button>
            </div>
        </div>
    </div>
</div>
