<section>

                        <div class="mat_date_input">
                            <input class="form-control" placeholder="Select a Date" matInput [matDatepicker]="picker2" (click)="picker2.open()"
                                formControlName="start_date">
                            <mat-datepicker-toggle matSuffix [for]="picker2" class="mat_date_toggle">

                            <mat-datepicker #picker2></mat-datepicker>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="row sub_header">
        <div class="col-md-8 text-right">
          <div class="d-inline-flex align-items-center">
            <div class="search-container">
              <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path d="M9.16667 15.8333C12.8486 15.8333 15.8333 12.8486 15.8333 9.16667C15.8333 5.48477 12.8486 2.5 9.16667 2.5C5.48477 2.5 2.5 5.48477 2.5 9.16667C2.5 12.8486 5.48477 15.8333 9.16667 15.8333Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M17.5 17.5L13.875 13.875" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <input type="text" class="form-control" placeholder="Search Keywords">
            </div>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-md-8">
            <table mat-table [dataSource]="activityList" matSort class="ch_table">
                <!-- activity Column -->
                <ng-container matColumnDef="activity">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header class="pl-5"> Activity </th>
                  <td mat-cell *matCellDef="let row" class="pl-5"> 
                    {{row.activity}} </td>
                </ng-container>
                 <!-- date Column -->
                 <ng-container matColumnDef="date">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Date </th>
                    <td mat-cell *matCellDef="let row"> 
                      {{row.date}} </td>
                  </ng-container>
                   <!-- time Column -->
                <ng-container matColumnDef="time">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Time </th>
                    <td mat-cell *matCellDef="let row"> 
                      {{row.time}} </td>
                  </ng-container>
    
                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    
                <tr class="mat-row" *matNoDataRow>
                  <td class="mat-cell" colspan="3" class="text-center">No data matching the filter</td>
                </tr>
              </table>
        </div>
      </div>
</section>
