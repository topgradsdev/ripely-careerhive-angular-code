<div class="inner-component modal fade bsModal ch_modal edit_element_modal" id="edit_yesNo{{data?.index}}" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel"
     aria-hidden="true"
     data-bs-backdrop="static" 
     data-bs-keyboard="false">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Edit</h2>
                <h3 *ngIf="!isAdvanced" (click)="isAdvanced = !isAdvanced;"> Advanced Options </h3>
                <h3 *ngIf="isAdvanced" (click)="isAdvanced = !isAdvanced;"> Back to Basic Options </h3>
                <button type="button" mat-icon-button id="closeModal" class="close" data-dismiss="modal"
                    aria-label="Close">
                    <mat-icon>close</mat-icon>
                </button>
            </div>
            <div class="modal-body">
                <div class="row" [formGroup]="textElementForm">
                    <div class="col-md-12">
                        <div class="form-group">
                            <label>Field Type</label>
                            <div class="row align-items-center">
                                <div class="col-md-6">
                                    <div class="element_select">
                                        <figure>
                                            <img src="../../../../../assets/icons/element-icons/yes-no.svg" alt="icon">
                                        </figure>
                                        <ng-select [searchable]="false" [multiple]="false" bindLabel="name"
                                            bindValue="id" [clearable]="false" placeholder="Select" formControlName="type">
                                            <ng-option value="Yes/No">Yes/No</ng-option>
                                        </ng-select>
                                    </div>
                                </div>
                                <div *ngIf="!isAdvanced" class="col-md-6 toggle_switch">
                                    <label class="title_label">Is required:</label>
                                    <mat-button-toggle-group class="custom_mat_switch" value="No" name="fontStyle" aria-label="Font Style" formControlName="required">
                                        <mat-button-toggle [value]="true">Yes</mat-button-toggle>
                                        <mat-button-toggle [value]="false">No</mat-button-toggle>
                                      </mat-button-toggle-group>
                                </div>
                            </div>
                        </div>
                    </div>
                    <ng-container *ngIf="!isAdvanced">
                    <div class="col-md-7">
                        <div class="form-group">
                            <label>Title</label>
                            <input type="text" class="form-control" placeholder="Enter Title" formControlName="title">
                        </div>
                    </div>
                    <div class="col-md-5 toggle_switch">
                        <label class="title_label">Display:</label>
                        <mat-button-toggle-group class="custom_mat_switch" value="Vertical" name="fontStyle" aria-label="Font Style" formControlName="display">
                            <mat-button-toggle [value]="'vertical'">Vertical</mat-button-toggle>
                            <mat-button-toggle [value]="'horizontal'">Horizontal</mat-button-toggle>
                          </mat-button-toggle-group>
                    </div>
                    <div class="col-md-12">
                        <div class="form-group">
                            <label>Description (Optional)</label>
                            <textarea rows="1" class="form-control" formControlName="description"></textarea>
                        </div>
                    </div>
                </ng-container>
                <ng-container *ngIf="isAdvanced">
                    <div class="col-md-12">
                        <div class="form-group">
                            <div class="permissions_List"> 
                                <div class="heading">Field Access</div>
                                <div class="row permissions_list_head">
                                    <div class="col-5 pl-5">Users</div>
                                    <div class="col-3">Read</div>
                                    <div class="col-4">Write</div>
                                </div>
                                <div class="permissions_list_card">
                                    <div class="row">
                                        <div class="col-5 pl-5">Students</div>
                                        <div class="col-3"> <mat-slide-toggle class="custom_switch" [(ngModel)]="permissions.student.read" [ngModelOptions]="{standalone: true}" (change)="addPermission('read', 'student')"></mat-slide-toggle></div>
                                        <div class="col-4"> <mat-slide-toggle class="custom_switch" [(ngModel)]="permissions.student.write" [ngModelOptions]="{standalone: true}" (change)="addPermission('write', 'student')"></mat-slide-toggle></div>
                                    </div>
                                    <div class="row">
                                        <div class="col-5 pl-5">Employers</div>
                                        <div class="col-3"> <mat-slide-toggle class="custom_switch" [(ngModel)]="permissions.employee.read" [ngModelOptions]="{standalone: true}" (change)="addPermission('read', 'employee')"></mat-slide-toggle></div>
                                        <div class="col-4"> <mat-slide-toggle class="custom_switch" [(ngModel)]="permissions.employee.write" [ngModelOptions]="{standalone: true}" (change)="addPermission('write', 'employee')"></mat-slide-toggle></div>
                                    </div>
                                    <div class="row">
                                        <div class="col-5 pl-5">Staff Members</div>
                                        <div class="col-3"> <mat-slide-toggle class="custom_switch" [(ngModel)]="permissions.staff.read" [ngModelOptions]="{standalone: true}" (change)="addPermission('read', 'staff')"></mat-slide-toggle></div>
                                        <div class="col-4"> <mat-slide-toggle class="custom_switch" [(ngModel)]="permissions.staff.write" [ngModelOptions]="{standalone: true}" (change)="addPermission('write', 'staff')"></mat-slide-toggle></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </ng-container>
                </div>
            </div>
            <div class="modal-footer justify-content-right">
                <button mat-button type="button" class="theme_btn btn_secondary" data-dismiss="modal" >Cancel</button>
                <button mat-button type="submit" class="theme_btn btn_primary"  data-dismiss="modal" (click)="submit()">Save</button>
            </div>
        </div>
    </div>
</div>
