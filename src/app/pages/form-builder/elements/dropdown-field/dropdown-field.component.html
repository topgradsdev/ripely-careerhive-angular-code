<div class="inner-component modal fade bsModal ch_modal edit_element_modal" id="edit_dropdown{{data?.index}}" tabindex="-1" role="dialog"

                <button type="button" mat-icon-button id="closeModal" class="close" data-dismiss="modal"

                            </div>
                        </div>
