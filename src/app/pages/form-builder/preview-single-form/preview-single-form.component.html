<section>
    <div class="preview_form_card">
        <div class="form_title">{{formName}}</div>
        <div class="row main_container">
            <div [ngClass]="field.isElementWidthFull ? 'col-md-12' : 'col-md-6'"
                *ngFor="let field of fields">
   
                <div class="form-group" *ngIf="field.name === 'Description Text'">
                       <input type="hidden" *ngIf="field.fieldType === 'textEditor'" type="text" class="form-control"
                        [(ngModel)]="field.elementData.value">
                        <p [innerHtml]="field.elementData.title">
                        </p>
                    </div>
                <div class="form-group" *ngIf="field.name !== 'Description Text'">
                    <label *ngIf="field.id !== 'description'">{{field.name}} <span
                            *ngIf="field.elementData?.required">(Required)</span>
                            <br/><small class="description-opacity">{{field.elementData?.description}}</small></label>
                    <p  *ngIf="field.id === 'description'"  [innerHTML]="field.elementData.value ? field.elementData.value : field.elementData.title" [ngClass]="checkFieldPermission(field.elementData?.permissions)" [attr.tabindex]="checkFieldPermission(field.elementData?.permissions) === 'readOnly' ? '-1' : null"></p>
                    <input *ngIf="field.id === 'single'" type="text" class="form-control"
                        [(ngModel)]="field.elementData.value">
                    <textarea *ngIf="field.id === 'multi'" class="form-control mb-0" cols="30" rows="2"
                        [(ngModel)]="field.elementData.value"></textarea>
                    <input *ngIf="field.id === 'number'" type="number" (wheel)="$event.preventDefault()"  (keydown.arrowup)="$event.preventDefault()"  (keydown.arrowdown)="$event.preventDefault()"  class="form-control"
                        [(ngModel)]="field.elementData.value">
                    <div *ngIf="field.id === 'time'" class="custom_datepicker_container custom_timepicker_wrapper">
                        <input class="form-control" placeholder="hh:mm" matInput [ngxTimepicker]="toggleTimepicker"
                            [format]="field?.elementData?.display" [disableClick]="true" readonly
                            [(ngModel)]="field.elementData.value">
                        <ngx-material-timepicker-toggle class="time_picker_toggle" [for]="toggleTimepicker">
                            <svg ngxMaterialTimepickerToggleIcon width="17" height="9" viewBox="0 0 17 9" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path d="M1 1L8.5 8L16 0.999997" stroke="#2B2A35" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                        </ngx-material-timepicker-toggle>
                        <ngx-material-timepicker #toggleTimepicker></ngx-material-timepicker>
                    </div>
                    <mat-radio-group *ngIf="field.id === 'yes_no'" class="radio_group"
                        [(ngModel)]="field.elementData.value"
                        [ngClass]="field.elementData?.display === 'horizontal' ? 'radio_horizontal' : ''">
                        <mat-radio-button [value]="'Yes'">Yes</mat-radio-button>
                        <mat-radio-button [value]="'No'">No</mat-radio-button>
                    </mat-radio-group>
                    <mat-radio-group *ngIf=" field.id === 'radio'" class="radio_group"
                        [(ngModel)]="field.elementData.value"
                        [ngClass]="field.elementData?.display === 'horizontal' ? 'radio_horizontal' : ''">
                        <mat-radio-button [value]="list.item"
                            *ngFor="let list of field.elementData.items">{{list.item}}</mat-radio-button>
                    </mat-radio-group>
                    <ng-select *ngIf="field.id === 'dropdown'"
                        [(ngModel)]="field.elementData.value" [searchable]="false" [multiple]="false"
                        bindLabel="item" [items]="field.elementData.items" bindValue="item"
                        [clearable]="false" placeholder="Select" [(ngModel)]="field.elementData.value">
                        <ng-option *ngFor="let list of field.elementData.items"
                            [value]="list">{{list}}</ng-option>
                    </ng-select>
                    <ul *ngIf="field.id === 'likert'" [ngClass]="field.elementData?.display === 'vertical' ? '' : 'likert'">
                        <li *ngFor="let item of field.elementData.items">
                            <mat-radio-button [value]="item.item"></mat-radio-button>
                            <label class="label_title">{{item.item}}</label>
                        </li>
                    </ul>
                    <ul *ngIf="field.id === 'chips'" class="chipsList">
                        <li *ngFor="let list of field?.elementData?.items">
                            <span>{{list.item}}</span>
                        </li>
                    </ul>

                <div *ngIf="field.id === 'image'">
                    <img [src]="field?.elementData?.value"
                        [height]="field?.elementData?.height"
                        [width]="field?.elementData?.width"
                        [style.opacity]="(+ (field?.elementData?.transparency ?? 100)) / 100"/>
                </div>
                    <div *ngIf="field.id === 'attachment'"
                        class="file_upload">
                        <p>Accepted file types: <span
                                *ngFor="let extention of field?.elementData?.extenstions">{{extention}},
                            </span>. <br>
                            {{field?.elementData?.size}}MB file size limit.</p>
                    </div>
                    <div *ngIf="field.id === 'date'" class="form-group custom_datepicker">
                        <div class="custom_datepicker_container">
                            <input placeholder="dd/mm/yyyy" class="form-control" matInput
                                [matDatepicker]="projectStartPicker"
                                [(ngModel)]="field.elementData.value">
                            <mat-datepicker-toggle matSuffix [for]="projectStartPicker">
                                <svg matDatepickerToggleIcon width="17" height="9" viewBox="0 0 17 9" fill="none"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path d="M1 1L8.5 8L16 0.999997" stroke="#2B2A35" stroke-width="2"
                                        stroke-linecap="round" stroke-linejoin="round" />
                                </svg>
                            </mat-datepicker-toggle>
                            <mat-datepicker #projectStartPicker></mat-datepicker>
                        </div>
                    </div>
                    <div *ngIf="field.id === 'checkbox'" class="checkbox_group "
                        [ngClass]="field.elementData?.display === 'horizontal' ? 'checkbox_horizontal' : ''">
                         <ul class="pl-0 checkbox-size">
                            <li *ngFor="let item of field.elementData.items">
                                <mat-checkbox [(ngModel)]="item.selected">
                                    {{item.item}}
                                </mat-checkbox>
                            </li>
                        </ul>
                    </div>
                    <ng-container *ngIf="field.id === 'signature'">
                    <div class="form-group mb-0" *ngFor="let item of field.elementData?.items; let i = index">
                        <div class="sign_from">
                            <label>{{item.item}} Signature:</label>
                            <canvas id="sPad{{i}}" class="form-control cavas_field" height="90" style="touch-action: none; border: 1px solid #f4f4f4;"></canvas>
                        </div>
                        <div class="sign_from">
                            <label>Name:</label>
                            <input type="text" placeholder="" class="form-control" [(ngModel)]="item.name">
                        </div>
                        <div class="sign_from">
                            <label>Date:</label>
                            <input type="text" placeholder="" class="form-control" [(ngModel)]="item.date">
                        </div>
                       </div>
                    </ng-container>
                    <ng-container *ngIf="field.id === 'downloadable'">
                        <ul class="files_list">
                            <li *ngFor="let attachment of field.elementData?.value">
                                <div class="file_card">
                                    <div class="content">
                                         <div class="svg-width d-flex justify-content-center align-items-center"  style="width: 60px;height:48px; padding-right: 8px;"[innerHTML]="getSafeSvg(attachment?.name)"></div>
                                        <p>{{attachment.name}}</p>
                                        <div class="btn_group">
                                            <button mat-icon-button (click)="viewPDF(attachment?.url)">
                                                <svg width="35" height="35" viewBox="0 0 35 35" fill="none"
                                                    xmlns="http://www.w3.org/2000/svg">
                                                    <circle cx="17.5" cy="17.5" r="17.5" fill="#F8F8F8" />
                                                    <path
                                                        d="M9.29565 17.7632C9.1361 17.5601 9.00404 17.3822 8.90095 17.2387C8.99761 17.0973 9.1211 16.923 9.27053 16.7246C9.69179 16.1651 10.3145 15.4194 11.1183 14.6754C12.7353 13.1787 15.0165 11.75 17.8214 11.75C20.6263 11.75 22.9076 13.1787 24.5246 14.6754C25.3283 15.4194 25.9511 16.1651 26.3723 16.7246C26.5218 16.923 26.6452 17.0973 26.7419 17.2387C26.6388 17.3822 26.5068 17.5601 26.3472 17.7632C25.9058 18.325 25.2587 19.0735 24.4375 19.82C22.7807 21.3262 20.4992 22.75 17.8214 22.75C15.1437 22.75 12.8621 21.3262 11.2054 19.82C10.3842 19.0735 9.73706 18.325 9.29565 17.7632Z"
                                                        stroke="#2B2A35" stroke-width="1.5" />
                                                    <circle cx="17.8214" cy="17.2511" r="2.82143" stroke="#2B2A35"
                                                        stroke-width="1.5" />
                                                </svg>
                                            </button>
                                            <button style="pointer-events: auto;" mat-icon-button (click)="downloadPDF(attachment?.url, attachment?.name)">
                                                <svg width="35" height="35" viewBox="0 0 35 35" fill="none"
                                                    xmlns="http://www.w3.org/2000/svg">
                                                    <circle cx="17.5" cy="17.5" r="17.5" fill="#F8F8F8" />
                                                    <path fill-rule="evenodd" clip-rule="evenodd"
                                                        d="M24.7923 20.4141V23.3307C24.7923 24.1361 24.1394 24.7891 23.334 24.7891H11.6673C10.8619 24.7891 10.209 24.1361 10.209 23.3307V20.4141H11.6673V23.3307H23.334V20.4141H24.7923Z"
                                                        fill="#2B2A35" />
                                                    <path fill-rule="evenodd" clip-rule="evenodd"
                                                        d="M18.2295 17.9258L20.6305 15.5248L21.6617 16.556L17.5003 20.7174L13.3389 16.556L14.3701 15.5248L16.7711 17.9258V10.207H18.2295V17.9258Z"
                                                        fill="#2B2A35" />
                                                </svg>


                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </li>
                        </ul>
                    </ng-container>
                </div>
            </div>
        </div>
    </div>
</section>
