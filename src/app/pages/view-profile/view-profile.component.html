<section class="edit-employer-sec">
	<div class="container">
		<div class="row">
			<div class="col-md-12">
				<div class="card">
					<div class="card-header">
						<strong>My Profile</strong>
					</div>
					<div class="card-body">
						<div class="edit-wrapper">
                            <form [formGroup]="profileform">
								<div class="text-center edit-profile">
									<span class="user_dp position-relative">
										<!-- <img src="{{this.image}}" *ngIf="this?.image" class="img-fluid">
										<img src="assets/img/avatars/8.jpg" *ngIf="!this?.image" class="img-fluid"> -->
										<img id="blah" [src]="imageSrc || image"  class="img-fluid"/>
										<mat-icon class="material-icons-outlined dp-icon">edit</mat-icon>
										<input type="file" class="dp-input" (change)="onSelect($event)" accept="image/*"
										formControlName="image" >
									</span>
									<div *ngIf="(profileform.touched || profileform.dirty) && profileform.invalid && profileform.controls.image?.errors?.required" class="invalid">
										*Please select image
								   </div>
									<div *ngIf="profileform.controls.county?.errors?.required  " class="invalid">
										*Only images are allowed
									</div>
								</div>
								<div class="edit-form mt-4">
									
										<div class="edit-form-fields">
											<div class="row justify-content-center">
												<div class="col-md-8">
													<div class="row">
														<div class="col-md-12">
															<div class="form-group">
																<label>First Name</label>
																<input type="text" name="" class="form-control" value="" [ngModel]="first_name | titlecase" (ngModelChange)="first_name"  [formControl]="profileform.controls['first_name']"
																oninput="this.value = !this.value.trim() ? this.value.trim() : this.value">
															</div>
															<div *ngIf="(profileform.controls.first_name?.touched || profileform.controls.first_name?.dirty)
															&& profileform.controls.first_name?.invalid && profileform.controls.first_name?.errors?.required"
														 style="color:red">
														 Please enter first name
													 </div>
														</div>
													
														<div class="col-md-12">
															<div class="form-group">
																<label>Last Name</label>
																<input type="text" name="" class="form-control" value="" [ngModel]="last_name | titlecase"  (ngModelChange)="last_name=$event" [formControl]="profileform.controls['last_name']"
																oninput="this.value = !this.value.trim() ? this.value.trim() : this.value">
															</div>
															<div *ngIf="(profileform.controls.last_name?.touched || profileform.controls.last_name?.dirty)
														           && profileform.controls.last_name?.invalid && profileform.controls.last_name?.errors?.required"
																style="color:red">
																Please enter last name
															</div>
														</div>
														
													</div>
													<div class="row">
														<div class="col-md-12">
															<div class="form-group">
																<label>Email Address</label>
																<input type="text" name="" class="form-control" value="" [formControl]="profileform.controls['email']" [(ngModel)]="email"
																oninput="this.value = !this.value.trim() ? this.value.trim() : this.value">
															</div>
															<div
																*ngIf="!profileform.controls['email'].valid && profileform.controls['email'].touched">
																<p style="color: #f90202"
																	*ngIf="profileform.controls['email'].touched && profileform.controls['email'].hasError('required')">
																	Please enter email
																</p>
																<div style="color: #f90202"
																	*ngIf="profileform.controls['email'].errors?.pattern">
																	Email must be a valid email address</div>
															</div>
														</div>
														
													</div>
													<div class="edit-btns d-flex justify-content-end">
														<button class="btn btn-primary mr-4" (click)="editprofile()">Save</button>
														<button class="btn btn-primary" routerLink="/dashboard">Cancel</button>
													</div>
												</div>
											</div>
										</div>
									
									
								</div>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</section>
