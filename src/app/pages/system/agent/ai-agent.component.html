                <div class="d-flex gap-3" *ngIf="selectedIndex==0">
                    <button mat-button class="theme_btn btn_primary" [routerLink]="['/admin/system/add-agent']">+ Create Agent</button>
                </div>
                  <div class="d-flex gap-3" *ngIf="selectedIndex==1">

            <mat-tab-group [selectedIndex]="selectedIndex" (selectedTabChange)="onTabChange($event)" animationDuration="0ms" class="mat_tab_bordred" >
                <mat-tab>
                    <ng-template mat-tab-label>Agents</ng-template>

                    <div class="container">
                        <div class="card" *ngFor="let reviewer of reviewers">
                            
                            <div class="image-wrapper">
                            <img [src]="reviewer.image" [alt]="reviewer.name" />
                            </div>

                            <div class="content">
                            <h3>{{ reviewer.name }}</h3>
                            <p class="role">{{ reviewer.role }}</p>

                            <div class="skills">
                                <span class="skill" *ngFor="let skill of reviewer.skills">
                                {{ skill }}
                                </span>
                            </div>

                            <button class="edit-btn" (click)="editReviewer(reviewer)">
                                Edit
                            </button>
                            </div>

                        </div>
                    </div>

                </mat-tab>
                <mat-tab>
                    <ng-template mat-tab-label>Knowledge Base</ng-template>

                    <div class="kb-container">
                        <div class="kb-card" *ngFor="let card of cards">

                            <h3 class="kb-title">{{ card.title }}</h3>

                            <p class="kb-desc">
                            {{ card.description }}
                            </p>

                            <div class="kb-skills mt-4">
                            <span class="kb-skill" *ngFor="let skill of card.skills">
                                {{ skill }}
                            </span>
                            </div>

                            <div class="kb-footer">
                            <button class="edit-btn" (click)="edit(card)">Edit</button>
                            </div>

                        </div>
                    </div>
                </mat-tab>
          </mat-tab-group>
