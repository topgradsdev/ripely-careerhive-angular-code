<div class="complete_placemet_card" *ngIf="projectDetails">
    <div class="p-4">
        <h2 class="mt-1 mb-2">
            Downloadable Content
        </h2>
        <p class="mb-2">
            Content set by the Project Owners are available here to be downloaded
        </p>
        <ul class="files_list d-flex flex-wrap mt-3" *ngIf="projectDetails.documents.length > 0">
            <li  class="file-item" *ngFor="let file of projectDetails.documents; let i = index;">
              <div class="file_card">
                <div class="content">
                <div class="svg-width d-flex justify-content-center align-items-center"  style="width: 60px;height:48px;padding-right: 8px;" [innerHTML]="getSafeSvg(file?.name)"></div>
                  <p>{{ file.name }}</p>
                </div>
                <div class="btn_group">
                  <!-- View Button -->
                  <button class="custom-icon-button" (click)="viewFile(i, file)" mat-icon-button>
                      <svg width="35" height="35" viewBox="0 0 35 35" fill="none" xmlns="http://www.w3.org/2000/svg">
                          <circle cx="17.5" cy="17.5" r="17.5" fill="#F8F8F8"/>
                          <path d="M9.29565 17.7632C9.1361 17.5601 9.00404 17.3822 8.90095 17.2387C8.99761 17.0973 9.1211 16.923 9.27053 16.7246C9.69179 16.1651 10.3145 15.4194 11.1183 14.6754C12.7353 13.1787 15.0165 11.75 17.8214 11.75C20.6263 11.75 22.9076 13.1787 24.5246 14.6754C25.3283 15.4194 25.9511 16.1651 26.3723 16.7246C26.5218 16.923 26.6452 17.0973 26.7419 17.2387C26.6388 17.3822 26.5068 17.5601 26.3472 17.7632C25.9058 18.325 25.2587 19.0735 24.4375 19.82C22.7807 21.3262 20.4992 22.75 17.8214 22.75C15.1437 22.75 12.8621 21.3262 11.2054 19.82C10.3842 19.0735 9.73706 18.325 9.29565 17.7632Z" stroke="#2B2A35" stroke-width="1.5"/>
                          <circle cx="17.8214" cy="17.2511" r="2.82143" stroke="#2B2A35" stroke-width="1.5"/>
                          </svg>
                          
                  </button>
                  &nbsp;&nbsp;
    
                  <!-- Delete Button -->
                  <button class="custom-icon-button" (click)="downloadFile(i, file)" mat-icon-button>
                      <svg width="35" height="35" viewBox="0 0 35 35" fill="none" xmlns="http://www.w3.org/2000/svg">
                          <circle cx="17.5" cy="17.5" r="17.5" fill="#F8F8F8"/>
                          <path fill-rule="evenodd" clip-rule="evenodd" d="M24.7923 20.4141V23.3307C24.7923 24.1361 24.1394 24.7891 23.334 24.7891H11.6673C10.8619 24.7891 10.209 24.1361 10.209 23.3307V20.4141H11.6673V23.3307H23.334V20.4141H24.7923Z" fill="#2B2A35"/>

                </div>
              </div>
            </li>
        </ul>

</div>
