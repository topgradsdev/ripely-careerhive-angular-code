   <div class="custom_paginator_container pt-4">
  <div class="custom_paginator" [ngClass]="paginator ? 'show' : ''">
    <button (click)="onPaginatorShow()" mat-icon-button>
      <svg class="coll_btn" width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" fill="#464BA8" />
        <path d="M10 16L14 12L10 8" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </button>

    <div class="paginator-wrapper">
      <mat-paginator
        [length]="paginationObj?.length"
        [pageSize]="paginationObj?.pageSize"
        [pageSizeOptions]="[5, 10, 25, 100]"
        aria-label="Select page"
        (page)="handlePageEvent($event)">
      </mat-paginator>
    </div>
  </div>
</div>
